<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💓</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FFF0F5;
            font-family: sans-serif;
        }

        .title {
            color: #FFB6C1;
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .heart-btn {
            position: relative;
            width: 140px;
            height: 140px;
            background-color: #FFB6C1;
            border: 6px solid #FFFFFF;
            transform: rotate(-45deg);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            transition: transform 0.1s ease;
            outline: none;
            margin-top: -20px;
        }

        .heart-btn::before,
        .heart-btn::after {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: #FFB6C1;
            border-radius: 50%;
        }

        .heart-btn::before {
            top: -76px;
            left: -6px;
            border-top: 6px solid #FFFFFF;
            border-left: 6px solid #FFFFFF;
            border-right: 6px solid #FFFFFF;
        }

        .heart-btn::after {
            top: -6px;
            left: 70px;
            border-top: 6px solid #FFFFFF;
            border-right: 6px solid #FFFFFF;
            border-bottom: 6px solid #FFFFFF;
        }

        .heart-btn:active {
            transform: rotate(-45deg) scale(0.92);
        }

        #hidden-frame {
            display: none;
        }
    </style>
</head>
<body>

    <div class="title">send love</div>
    
    <iframe name="hidden-frame" id="hidden-frame"></iframe>

    <!-- THE DATA PACK: Carefully look at the value="" lines below -->
    <form id="love-form" action="https://pushover.net" method="POST" target="hidden-frame">
        <input type="hidden" name="token" value="a25gmaqyz1fujrnb4c9mvkx8eoeo7v">
        <input type="hidden" name="user" value="gof5j2ds3nir12favu8dy6dyshmx51">
        <input type="hidden" name="message" value="🌸 Front Updated! 💓">
    </form>

    <button class="heart-btn" onclick="triggerPing()"></button>

    <script>
        function triggerPing() {
            document.getElementById("love-form").submit();
            alert("Ping sent beautifully! 💕");
        }
    </script>
</body>
</html>
