<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💓</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FFF0F5;
            font-family: sans-serif;
        }

        .title {
            color: #FFB6C1;
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .heart-btn {
            position: relative;
            width: 140px;
            height: 140px;
            background-color: #FFB6C1;
            border: 6px solid #FFFFFF;
            transform: rotate(-45deg);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            transition: transform 0.1s ease;
            outline: none;
            margin-top: -20px;
        }

        .heart-btn::before,
        .heart-btn::after {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: #FFB6C1;
            border-radius: 50%;
        }

        .heart-btn::before {
            top: -76px;
            left: -6px;
            border-top: 6px solid #FFFFFF;
            border-left: 6px solid #FFFFFF;
            border-right: 6px solid #FFFFFF;
        }

        .heart-btn::after {
            top: -6px;
            left: 70px;
            border-top: 6px solid #FFFFFF;
            border-right: 6px solid #FFFFFF;
            border-bottom: 6px solid #FFFFFF;
        }

        .heart-btn:active {
            transform: rotate(-45deg) scale(0.92);
        }

        #hidden-frame {
            display: none;
        }
    </style>
</head>
<body>


    <!-- 1. REMOVE THE OLD FORM AND IFRAME COMPLETELY -->
    <!-- 2. KEEP YOUR ORIGINAL HEART BUTTON -->
    <button class="heart-btn" onclick="triggerPing()"></button>

    <script>
        function triggerPing() {
            // Define your real keys here securely
            const apiToken = "a25gmaqyz1fujrnb4c9mvkx8eoeo7v";
            const userOrGroupKey = "gof5j2ds3nir12favu8dy6dyshmx51";
            const messageText = "🌸 Front Updated! 💓";

            // Prepare the payload parameters exactly how Pushover likes it
            const params = new URLSearchParams();
            params.append("token", apiToken);
            params.append("user", userOrGroupKey);
            params.append("message", messageText);

            // Fire the request directly into the background
            fetch("https://api.pushover.net/1/messages.json", {
                method: "POST",
                body: params,
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                mode: "no-cors" // Crucial: Tells the browser not to block the response
            })
            .then(() => {
                // Because of 'no-cors', the browser can't "read" the success message,
                // but the network request still successfully hits Pushover's servers.
                alert("Ping sent beautifully! 💕");
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Something went wrong sending the love. 😢");
            });
        }
    </script>
</body>
</html>
